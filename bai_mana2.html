<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BAI Tower Map Widget</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- html2canvas for export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #e8eaf0;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }

  /* ── Window Shell ─────────────────────────────────────────────────── */
  .bai-window {
    width: 900px; max-width: 100%;
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,.22), 0 2px 8px rgba(0,0,0,.12);
    border: 1px solid #c0c4cc;
    background: #fff;
    display: flex; flex-direction: column;
  }

  /* Title bar */
  .bai-titlebar {
    background: linear-gradient(135deg, #42a447 0%, #7a1039 100%);
    color: #fff;
    padding: 0 14px;
    height: 38px;
    display: flex; align-items: center; justify-content: space-between;
    user-select: none;
    flex-shrink: 0;
  }
  .bai-titlebar-left { display: flex; align-items: center; gap: 10px; }
  .bai-titlebar-dots { display: flex; gap: 6px; }
  .bai-dot {
    width: 12px; height: 12px; border-radius: 50%;
    opacity: .85;
  }
  .bai-dot-red    { background: #ff5f56; }
  .bai-dot-yellow { background: #ffbd2e; }
  .bai-dot-green  { background: #27c93f; }
  .bai-titlebar-title { font-size: 13px; font-weight: 600; letter-spacing: .3px; }
  .bai-titlebar-right { font-size: 11px; opacity: .7; }

  /* ── Hide default Leaflet zoom control — we replace it ───────────── */
  .leaflet-control-zoom { display: none !important; }

  /* ── Layer switcher — top-right, teal diamond icon ───────────────── */
  .bai-layer-switcher {
    position: absolute;
    top: 10px; right: 10px;
    z-index: 1000;
  }
  /* The teal diamond toggle button */
  .bai-layer-icon-btn {
    width: 36px; height: 36px;
    background: #fff;
    border: 2px solid rgba(0,0,0,.2);
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 5px rgba(0,0,0,.2);
    transition: background .15s;
  }
  .bai-layer-icon-btn:hover { background: #f0f0f0; }
  /* Diamond shape */
  .bai-diamond {
    width: 18px; height: 18px;
    background: linear-gradient(135deg, #4ecdc4, #2bb5ab);
    transform: rotate(45deg);
    border-radius: 2px;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  /* Layer panel that opens */
  .bai-layer-panel {
    position: absolute; top: 42px; right: 0;
    background: #fff;
    border: 1px solid rgba(0,0,0,.18);
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,.18);
    min-width: 160px;
    display: none; overflow: hidden;
  }
  .bai-layer-panel.open { display: block; }
  .bai-layer-panel-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: #888;
    padding: 8px 12px 4px;
    border-bottom: 1px solid #eee;
  }
  .bai-layer-option {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; cursor: pointer;
    font-size: 12.5px; font-weight: 600; color: #333;
    transition: background .12s;
    border-bottom: 1px solid #f5f5f5;
  }
  .bai-layer-option:last-child { border-bottom: none; }
  .bai-layer-option:hover { background: #f5f5f5; }
  .bai-layer-option.active { color: #42a447; background: #fdf0f5; }
  .bai-layer-option-thumb {
    width: 32px; height: 22px; border-radius: 3px;
    border: 1px solid #ddd; object-fit: cover; flex-shrink: 0;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .bai-layer-option-thumb.street  { background: #e8f4e8; }
  .bai-layer-option-thumb.satellite { background: #1a2a3a; color: #7ab; font-size: 14px; }
  .bai-layer-option-thumb.topo    { background: #f5e8d0; }
  .bai-layer-radio {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid #ccc; margin-left: auto; flex-shrink: 0;
    transition: border-color .15s, background .15s;
  }
  .bai-layer-option.active .bai-layer-radio {
    border-color: #42a447; background: #42a447;
  }

  /* ── Vertical zoom + extent bar — left side ──────────────────────── */
  .bai-zoom-bar {
    position: absolute;
    top: 10px; left: 10px;
    z-index: 1000;
    display: flex; flex-direction: column;
    align-items: center;
    background: #fff;
    border: 2px solid rgba(0,0,0,.2);
    border-radius: 4px;
    box-shadow: 0 1px 5px rgba(0,0,0,.2);
    overflow: hidden;
    width: 36px;
  }
  .bai-zoom-btn {
    width: 36px; height: 34px;
    background: #fff; border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #333;
    cursor: pointer; line-height: 1;
    transition: background .15s, color .15s;
    flex-shrink: 0;
  }
  .bai-zoom-btn:hover { background: #f4f4f4; }
  .bai-zoom-btn.bai-extent-btn {
    font-size: 13px; font-weight: 800; color: #fff;
    background: #42a447; letter-spacing: .5px;
    border-bottom: 2px solid rgba(0,0,0,.15);
  }
  .bai-zoom-btn.bai-extent-btn:hover { background: #7a1039; }
  .bai-zoom-divider {
    width: 24px; height: 1px; background: rgba(0,0,0,.15); flex-shrink: 0;
  }
  /* Vertical zoom track */
  .bai-zoom-track {
    width: 6px; height: 80px;
    background: #e0e0e0;
    border-radius: 3px;
    margin: 6px 0;
    position: relative;
    flex-shrink: 0;
    cursor: pointer;
  }
  .bai-zoom-thumb {
    position: absolute;
    left: -3px; width: 12px; height: 12px;
    background: #42a447; border: 2px solid #fff;
    border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
    cursor: grab;
    transition: top .1s;
  }
  .bai-default-btn {
    font-size: 11px; font-weight: 700; color: #555;
    height: 28px;
    border-top: 1px solid rgba(0,0,0,.1);
    width: 100%;
    background: #f9f9f9;
  }
  .bai-default-btn:hover { background: #f0f0f0; color: #42a447; }

  /* ── Export button — bottom-right of map ───────────────────────────── */
  .bai-export-wrap {
    position: absolute;
    bottom: 28px; right: 10px;
    z-index: 1000;
  }
  .bai-export-btn {
    display: flex; align-items: center; gap: 6px;
    background: #fff; border: 2px solid rgba(0,0,0,.2);
    border-radius: 4px; padding: 6px 11px;
    font-size: 12px; font-weight: 700; color: #333;
    cursor: pointer; white-space: nowrap;
    box-shadow: 0 1px 5px rgba(0,0,0,.15);
    transition: background .15s, color .15s;
  }
  .bai-export-btn:hover { background: #f4f4f4; }
  .bai-export-dropdown {
    position: absolute; bottom: calc(100% + 4px); right: 0;
    background: #fff; border: 1px solid #ccd0d9;
    border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,.18);
    z-index: 9999; min-width: 230px;
    display: none; overflow: hidden;
  }
  .bai-export-dropdown.open { display: block; }
  .bai-export-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; font-size: 12.5px; color: #333;
    cursor: pointer; border-bottom: 1px solid #f0f0f0;
    transition: background .12s;
  }
  .bai-export-item:last-child { border-bottom: none; }
  .bai-export-item:hover { background: #f9f0f4; color: #42a447; }
  .bai-export-item svg { color: #42a447; flex-shrink: 0; }
  .bai-export-item-label { font-weight: 600; }
  .bai-export-item-desc  { font-size: 11px; color: #888; }

  /* Map area */
  .bai-map-body {
    display: flex; flex: 1; overflow: hidden; position: relative;
  }
  #bai-map { flex: 1; height: 500px; display: block; background: #ddd; position: relative; }

  /* Status bar */
  .bai-statusbar {
    background: #f5f6f8;
    border-top: 1px solid #dde0e7;
    padding: 5px 12px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: #666;
    flex-shrink: 0;
  }
  .bai-statusbar-coords { font-family: 'Courier New', monospace; }

  /* Leaflet popup */
  .bai-popup .leaflet-popup-content-wrapper {
    border-radius: 6px !important; padding: 0 !important; overflow: hidden;
    min-width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,.2) !important;
  }
  .bai-popup .leaflet-popup-content { margin: 0 !important; width: 280px !important; }
  .bai-popup .leaflet-popup-tip-container { display: none; }
  .bai-popup-header {
    background: #42a447; color: #fff;
    padding: 10px 14px; display: flex; align-items: center; gap: 8px;
  }
  .bai-popup-header h3 { font-size: 15px; font-weight: 700; margin: 0; }
  .bai-popup-body { padding: 12px 14px; }
  .bai-popup-body p { font-size: 13px; color: #444; line-height: 1.55; margin: 0 0 5px; }
  .bai-popup-body p:last-child { margin-bottom: 0; }
  .bai-popup-label { font-weight: 700; color: #222; }

  /* Custom pin */
  .bai-pin {
    width: 32px; height: 32px;
    border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    background: #42a447; border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center;
  }
  .bai-pin-icon { transform: rotate(45deg); font-size: 13px; line-height: 1; }

  /* Hover photo tooltip */
  #bai-hover-img {
    position: fixed; z-index: 99999; pointer-events: none;
    display: none; border-radius: 6px; overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,.3); border: 2px solid #fff; width: 220px;
  }
  #bai-hover-img img { width: 100%; height: 148px; object-fit: cover; display: block; }
  #bai-hover-img .bai-hover-caption {
    background: rgba(0,0,0,.72); color: #fff;
    font-size: 11px; padding: 5px 8px; text-align: center;
  }

  /* Legend panel */
  .bai-legend-panel {
    width: 200px; flex-shrink: 0;
    background: #fff; border-left: 1px solid #dde0e7;
    overflow-y: auto; padding: 10px 0;
  }
  .bai-legend-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: #42a447;
    padding: 4px 12px 8px; border-bottom: 1px solid #eee; margin-bottom: 4px;
  }
  .bai-legend-card {
    padding: 8px 12px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .15s, border-color .15s;
  }
  .bai-legend-card:hover { background: #fdf0f5; border-left-color: #42a447; }
  .bai-legend-card-name { font-size: 12.5px; font-weight: 700; color: #42a447; }
  .bai-legend-card-desc { font-size: 11px; color: #666; margin-top: 2px; line-height: 1.4; }

  /* Toast */
  .bai-toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #222; color: #fff; border-radius: 6px;
    padding: 10px 20px; font-size: 13px;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
    z-index: 99999; transition: transform .3s ease, opacity .3s ease;
    opacity: 0;
  }
  .bai-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- ── Window ─────────────────────────────────────────────────────── -->
<div class="bai-window" id="bai-window">

  <!-- Map + Legend side-panel -->
  <div class="bai-map-body" id="bai-map-body">
    <div id="bai-map">

      <!-- Vertical zoom + extent bar — left -->
      <div class="bai-zoom-bar">
        <!-- E = Zoom to Extent -->
        <button class="bai-zoom-btn bai-extent-btn" onclick="baiMap.zoomToExtent()" title="Zoom to full extent of all towers">E</button>
        <!-- + zoom -->
        <button class="bai-zoom-btn" id="bai-zoom-in" onclick="baiMap.zoomIn()" title="Zoom in" style="border-bottom:1px solid rgba(0,0,0,.1)">+</button>
        <!-- Vertical zoom track -->
        <div class="bai-zoom-track" id="bai-zoom-track" onclick="baiMap.trackClick(event)">
          <div class="bai-zoom-thumb" id="bai-zoom-thumb"></div>
        </div>
        <!-- - zoom -->
        <button class="bai-zoom-btn" id="bai-zoom-out" onclick="baiMap.zoomOut()" title="Zoom out" style="border-top:1px solid rgba(0,0,0,.1)">−</button>
        <!-- Default view -->
        <button class="bai-zoom-btn bai-default-btn" onclick="baiMap.zoomToDefault()" title="Return to default view" style="font-size:9px;letter-spacing:.3px">DEF</button>
      </div>

      <!-- Layer switcher — top right, teal diamond -->
      <div class="bai-layer-switcher" id="bai-layer-switcher">
        <button class="bai-layer-icon-btn" onclick="baiMap.toggleLayers()" title="Switch base layer">
          <div class="bai-diamond"></div>
        </button>
        <div class="bai-layer-panel" id="bai-layer-panel">
          <div class="bai-layer-panel-title">Base Layers</div>
          <div class="bai-layer-option active" id="lopt-street" onclick="baiMap.setLayer('street')">
            <div class="bai-layer-option-thumb street">🗺</div>
            <span>Street</span>
            <div class="bai-layer-radio"></div>
          </div>
          <div class="bai-layer-option" id="lopt-topo" onclick="baiMap.setLayer('topo')">
            <div class="bai-layer-option-thumb topo">🏔</div>
            <span>Topographic</span>
            <div class="bai-layer-radio"></div>
          </div>
          <div class="bai-layer-option" id="lopt-satellite" onclick="baiMap.setLayer('satellite')">
            <div class="bai-layer-option-thumb satellite">🛰</div>
            <span>Satellite</span>
            <div class="bai-layer-radio"></div>
          </div>
        </div>
      </div>

      <!-- Export — bottom right -->
      <div class="bai-export-wrap" id="export-wrap">
        <div class="bai-export-dropdown" id="export-dropdown">
          <div class="bai-export-item" onclick="baiMap.exportMap(true)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <div><div class="bai-export-item-label">Export with Legend</div><div class="bai-export-item-desc">Map + sidebar legend as PNG</div></div>
          </div>
          <div class="bai-export-item" onclick="baiMap.exportMap(false)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <div><div class="bai-export-item-label">Export without Legend</div><div class="bai-export-item-desc">Map only as PNG</div></div>
          </div>
        </div>
        <button class="bai-export-btn" onclick="baiMap.toggleExport()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export ▾
        </button>
      </div>

    </div>
    <div class="bai-legend-panel" id="bai-legend-panel">
      <div class="bai-legend-title">📡 Towers</div>
      <div id="bai-tower-legend"></div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="bai-statusbar">
    <span id="bai-status-left">5 measurement towers · Münster region</span>
    <span class="bai-statusbar-coords" id="bai-coords">Lat: — &nbsp; Lng: —</span>
  </div>

</div>

<!-- Hover tooltip -->
<div id="bai-hover-img">
  <img id="bai-hover-img-src" src="" alt="Tower site photo"/>
  <div class="bai-hover-caption" id="bai-hover-caption"></div>
</div>

<!-- Toast notification -->
<div class="bai-toast" id="bai-toast"></div>

<!-- ── Script ─────────────────────────────────────────────────────── -->
<script>
window.baiMap = (function () {

  var TOWERS = [
    {
      id: 'amsven', name: 'Amsven',
      lat: 51.9785, lng: 7.5430,
      type: 'Eddy Covariance Tower', ecosystem: 'Grassland / Peatland',
      height: '4 m (canopy) · 10 m (atmosphere)',
      sensors: 'CO₂/H₂O flux, meteorology, soil temperature & moisture',
      installed: '2016',
      notes: 'Long-term monitoring of carbon and water exchange in a managed grassland on organic soils.',
      photo: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400&q=80',
      photoCredit: 'Amsven – Grassland tower'
    },
    {
      id: 'lundforest', name: 'Lund Forest',
      lat: 52.0280, lng: 7.6540,
      type: 'Tall Tower / Forest Stand', ecosystem: 'Temperate Deciduous Forest',
      height: '30 m above canopy',
      sensors: 'Eddy covariance, radiation balance, sap flow, litterfall',
      installed: '2018',
      notes: 'Monitoring net ecosystem production and phenology dynamics of a mature beech-dominated stand.',
      photo: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=400&q=80',
      photoCredit: 'Lund Forest – tall tower'
    },
    {
      id: 'rieselfeld', name: 'Rieselfeld / Haarstrasse',
      lat: 52.0050, lng: 7.6200,
      type: 'Wetland Flux Tower', ecosystem: 'Rewetted Floodplain / Fen',
      height: '6 m',
      sensors: 'CH₄ & CO₂ flux, water table, soil redox, leaf wetness',
      installed: '2019',
      notes: 'Greenhouse gas dynamics in a rewetted fen on former sewage-irrigation fields (Rieselfelder).',
      photo: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=80',
      photoCredit: 'Rieselfeld – wetland tower'
    },
    {
      id: 'steinfurt', name: 'Steinfurtinstrasse',
      lat: 51.9820, lng: 7.5921,
      type: 'Urban / Peri-urban Tower', ecosystem: 'Urban Green / Road Corridor',
      height: '15 m',
      sensors: 'NO₂, O₃, particle flux, T & RH profile',
      installed: '2021',
      notes: 'Impact of urban vegetation on air quality and microclimate along a major traffic artery.',
      photo: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=400&q=80',
      photoCredit: 'Steinfurtinstrasse – urban tower'
    },
    {
      id: 'haarstrasse', name: 'Haarstrasse',
      lat: 51.9670, lng: 7.6600,
      type: 'Agricultural Flux Tower', ecosystem: 'Arable / Cropland',
      height: '3 m above crop',
      sensors: 'CO₂ & H₂O flux, NDVI camera, soil N₂O',
      installed: '2020',
      notes: 'Year-round flux measurements over a winter wheat / maize rotation.',
      photo: 'https://images.unsplash.com/photo-1500595046743-cd271d694d30?w=400&q=80',
      photoCredit: 'Haarstrasse – cropland tower'
    }
  ];

  var DEFAULT_CENTER = [51.993, 7.620], DEFAULT_ZOOM = 12;
  var map, streetLayer, satelliteLayer, topoLayer, activeLayer = 'street', markers = {};
  var MIN_ZOOM = 8, MAX_ZOOM = 18;

  function boot() {
    if (typeof L === 'undefined' || !document.getElementById('bai-map')) {
      setTimeout(boot, 80); return;
    }
    initMap(); addMarkers(); buildLegend(); bindHover(); bindCoords(); updateZoomThumb();
    map.on('zoomend', updateZoomThumb);
    setTimeout(function () { map.invalidateSize(); }, 250);
    setTimeout(function () { map.invalidateSize(); }, 900);
  }

  function initMap() {
    map = L.map('bai-map', { center: DEFAULT_CENTER, zoom: DEFAULT_ZOOM, zoomControl: false });
    streetLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
      { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>', subdomains: 'abcd', maxZoom: 19 });
    topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
      { attribution: '© <a href="https://opentopomap.org">OpenTopoMap</a>', maxZoom: 17 });
    satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { attribution: 'Tiles © Esri — Source: Esri, Maxar, GeoEye, Earthstar Geographics', maxZoom: 19 });
    streetLayer.addTo(map);
  }

  function setLayer(which) {
    if (which === activeLayer) return;
    // remove all
    [streetLayer, topoLayer, satelliteLayer].forEach(function(l){ if (map.hasLayer(l)) map.removeLayer(l); });
    if (which === 'satellite') satelliteLayer.addTo(map);
    else if (which === 'topo') topoLayer.addTo(map);
    else streetLayer.addTo(map);
    activeLayer = which;
    // update UI
    ['street','topo','satellite'].forEach(function(id) {
      var el = document.getElementById('lopt-' + id);
      if (el) el.classList.toggle('active', id === which);
    });
    document.getElementById('bai-layer-panel').classList.remove('open');
  }

  function toggleLayers() {
    var panel = document.getElementById('bai-layer-panel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      setTimeout(function() {
        document.addEventListener('click', closeLayers, { once: true });
      }, 10);
    }
  }
  function closeLayers(e) {
    var sw = document.getElementById('bai-layer-switcher');
    if (!sw.contains(e.target)) {
      document.getElementById('bai-layer-panel').classList.remove('open');
    }
  }

  function zoomIn()  { map.setZoom(map.getZoom() + 1); }
  function zoomOut() { map.setZoom(map.getZoom() - 1); }

  function updateZoomThumb() {
    var z = map.getZoom();
    var minZ = map.getMinZoom() || MIN_ZOOM;
    var maxZ = map.getMaxZoom() || MAX_ZOOM;
    var track = document.getElementById('bai-zoom-track');
    var thumb = document.getElementById('bai-zoom-thumb');
    if (!track || !thumb) return;
    var trackH = track.offsetHeight - 12;
    var pct = 1 - (z - minZ) / (maxZ - minZ);
    thumb.style.top = Math.max(0, Math.min(trackH, Math.round(pct * trackH))) + 'px';
  }

  function trackClick(e) {
    var track = document.getElementById('bai-zoom-track');
    var rect = track.getBoundingClientRect();
    var pct = (e.clientY - rect.top) / rect.height;
    var minZ = map.getMinZoom() || MIN_ZOOM;
    var maxZ = map.getMaxZoom() || MAX_ZOOM;
    var z = Math.round((1 - pct) * (maxZ - minZ) + minZ);
    map.setZoom(Math.max(minZ, Math.min(maxZ, z)));
  }

  function zoomToExtent() {
    var lats = TOWERS.map(function(t){ return t.lat; });
    var lngs = TOWERS.map(function(t){ return t.lng; });
    var bounds = L.latLngBounds(
      [Math.min.apply(null,lats) - 0.01, Math.min.apply(null,lngs) - 0.01],
      [Math.max.apply(null,lats) + 0.01, Math.max.apply(null,lngs) + 0.01]
    );
    map.fitBounds(bounds, { padding: [30, 30], animate: true });
    showToast('Zoomed to full tower extent');
  }

  function zoomToDefault() {
    map.setView(DEFAULT_CENTER, DEFAULT_ZOOM, { animate: true });
    showToast('Returned to default view');
  }

  function makeIcon() {
    return L.divIcon({
      className: '',
      html: '<div class="bai-pin"><span class="bai-pin-icon">📡</span></div>',
      iconSize: [32, 40], iconAnchor: [16, 40], popupAnchor: [0, -42]
    });
  }

  function makePopupHTML(t) {
    return '<div class="bai-popup-header"><span>📡</span><h3>' + t.name + '</h3></div>' +
      '<div class="bai-popup-body">' +
      '<p><span class="bai-popup-label">Type: </span>'     + t.type      + '</p>' +
      '<p><span class="bai-popup-label">Ecosystem: </span>'+ t.ecosystem + '</p>' +
      '<p><span class="bai-popup-label">Height: </span>'   + t.height    + '</p>' +
      '<p><span class="bai-popup-label">Sensors: </span>'  + t.sensors   + '</p>' +
      '<p><span class="bai-popup-label">Installed: </span>'+ t.installed + '</p>' +
      '<p>' + t.notes + '</p></div>';
  }

  function addMarkers() {
    var box = document.getElementById('bai-hover-img');
    var img = document.getElementById('bai-hover-img-src');
    var cap = document.getElementById('bai-hover-caption');
    TOWERS.forEach(function (t) {
      var m = L.marker([t.lat, t.lng], { icon: makeIcon() }).addTo(map);
      m.bindPopup(makePopupHTML(t), { maxWidth: 300, className: 'bai-popup', closeButton: true });
      m.on('mouseover', function () { img.src = t.photo; cap.textContent = t.photoCredit; box.style.display = 'block'; });
      m.on('mouseout',  function () { box.style.display = 'none'; });
      markers[t.id] = m;
    });
  }

  function buildLegend() {
    var el = document.getElementById('bai-tower-legend');
    TOWERS.forEach(function (t) {
      var c = document.createElement('div');
      c.className = 'bai-legend-card';
      c.innerHTML = '<div class="bai-legend-card-name">📡 ' + t.name + '</div>' +
        '<div class="bai-legend-card-desc"><strong>' + t.type + '</strong><br>' + t.ecosystem + '</div>';
      c.addEventListener('click', function () {
        map.setView([t.lat, t.lng], 15, { animate: true });
        setTimeout(function () { markers[t.id].openPopup(); }, 420);
      });
      el.appendChild(c);
    });
  }

  function bindCoords() {
    map.on('mousemove', function(e) {
      var lat = e.latlng.lat.toFixed(5), lng = e.latlng.lng.toFixed(5);
      document.getElementById('bai-coords').innerHTML = 'Lat: ' + lat + ' &nbsp; Lng: ' + lng;
    });
  }

  function bindHover() {
    var box = document.getElementById('bai-hover-img');
    document.addEventListener('mousemove', function (e) {
      if (box.style.display !== 'block') return;
      var x = e.clientX + 22, y = e.clientY - 85;
      if (x + 240 > window.innerWidth)  x = e.clientX - 242;
      if (y < 8) y = e.clientY + 18;
      box.style.left = x + 'px'; box.style.top = y + 'px';
    });
  }

  /* ── Export ──────────────────────────────────────────────────────── */
  function toggleExport() {
    var dd = document.getElementById('export-dropdown');
    dd.classList.toggle('open');
    // close on outside click
    setTimeout(function() {
      document.addEventListener('click', closeExportOnce, { once: true });
    }, 10);
  }
  function closeExportOnce(e) {
    var wrap = document.getElementById('export-wrap');
    if (!wrap.contains(e.target)) {
      document.getElementById('export-dropdown').classList.remove('open');
    }
  }

  function exportMap(withLegend) {
    document.getElementById('export-dropdown').classList.remove('open');
    showToast(withLegend ? 'Exporting map with legend…' : 'Exporting map only…');

    var legendPanel = document.getElementById('bai-legend-panel');
    var originalDisplay = legendPanel.style.display;
    if (!withLegend) legendPanel.style.display = 'none';

    var target = document.getElementById('bai-map-body');
    if (!withLegend) target = document.getElementById('bai-map');

    setTimeout(function() {
      html2canvas(target, {
        useCORS: true,
        allowTaint: true,
        scale: 2,
        backgroundColor: '#fff',
        logging: false
      }).then(function(canvas) {
        if (!withLegend) legendPanel.style.display = originalDisplay;
        var link = document.createElement('a');
        link.download = withLegend ? 'bai_towers_with_legend.png' : 'bai_towers_map_only.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('✓ Export saved as PNG');
      }).catch(function() {
        if (!withLegend) legendPanel.style.display = originalDisplay;
        showToast('Export failed – check CORS settings');
      });
    }, 150);
  }

  /* ── Toast ───────────────────────────────────────────────────────── */
  var toastTimer;
  function showToast(msg) {
    var el = document.getElementById('bai-toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2800);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }

  return { setLayer, toggleLayers, zoomIn, zoomOut, zoomToExtent, zoomToDefault, trackClick, toggleExport, exportMap };
}());
</script>
</body>
</html>
